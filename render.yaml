services:
  - type: web
    name: isl-backend
    runtime: python
    plan: free
    rootDir: backend1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://isl-ai-translator-1.onrender.com

  - type: web
    name: isl-ai-translator-1
    runtime: static
    rootDir: ISL-Converter
    buildCommand: npm ci && npm run build
    staticPublishPath: ./ISL-Converter/dist
    envVars:
      - key: VITE_API_BASE
        value: https://isl-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
