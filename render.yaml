services:
  - type: web
    name: isl-backend
    runtime: python
    plan: free
    rootDir: backend1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: isl-ai-translator-1
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: isl-ai-translator-1
    runtime: static
    plan: free
    rootDir: ISL-Converter
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: isl-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
