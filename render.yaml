services:
  - type: web
    name: isl-backend
    runtime: python
    rootDir: backend1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
  - type: web
    name: isl-frontend
    runtime: static
    rootDir: ISL-Converter
    buildCommand: npm install && npm run build
    staticPublishPath: ISL-Converter/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
